name: license-check

on:
  push:
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  addlicense:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA for supply-chain integrity.
      # The trailing version comment lets Dependabot bump both SHA and comment.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      # Version must match tools/go.mod and .pre-commit-config.yaml — Dependabot bumps go.mod; update here and in .pre-commit-config.yaml to match.
      - run: go install github.com/google/addlicense@v1.2.0
      # Verify every source file carries the header in tools/license-header.txt.
      # The extension list MUST match the pre-commit hook in
      # .pre-commit-config.yaml so local and CI enforce the identical set —
      # otherwise a contributor's file could pass locally and fail here.
      - run: |
          # :!third_party/** excludes vendored code — it keeps its own license.
          files=$(git ls-files \
            '*.c' '*.cc' '*.cxx' '*.cpp' \
            '*.h' '*.hh' '*.hpp' '*.hxx' \
            '*.inl' '*.ipp' '*.tpp' \
            '*.py' '*.sh' \
            ':!third_party/**')
          if [ -n "$files" ]; then
            addlicense -check -f tools/license-header.txt $files
          else
            echo "No source files require license headers yet."
          fi
