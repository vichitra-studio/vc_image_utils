# pre-commit builds addlicense in its own isolated environment (~/.cache/pre-commit).
# addlicense itself does not need a global install, but `language: golang` hooks
# require Go to already be on the system PATH — pre-commit does not install Go.
# See BUILDING.md (Contributing prerequisites) for Go and pre-commit install instructions.
# Install the hooks once with:  pre-commit install
repos:
  - repo: local
    hooks:
      - id: addlicense
        name: addlicense (insert SPDX/copyright header)
        entry: addlicense -f tools/license-header.txt
        language: golang
        additional_dependencies:
          - github.com/google/addlicense@v1.2.0
        # C/C++ sources + inline/template headers, plus shell and Python
        # tooling scripts. Keep this list in sync with the CI check in
        # .github/workflows/license-check.yml. (No CUDA — CPU-only project.)
        files: \.(c|cc|cxx|cpp|h|hh|hpp|hxx|inl|ipp|tpp|py|sh)$
        # Vendored third-party code keeps its own license — never inject ours.
        exclude: ^third_party/

      - id: clang-format
        name: clang-format (C/C++ formatting)
        entry: clang-format -i
        language: system
        # Matches the same extension set as addlicense (minus .py/.sh — clang-format is C/C++ only).
        files: \.(c|cc|cxx|cpp|h|hh|hpp|hxx|inl|ipp|tpp)$
        # Never auto-format vendored headers — preserves upstream diff-ability.
        exclude: ^third_party/
